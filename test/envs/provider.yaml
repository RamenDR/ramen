# Environment for stress testing cluster creation by starting multiple clusters
# in parallel.
---
name: "provider"

templates:
  - name: "cluster"
    driver: "$vm"
    container_runtime: containerd
    network: "$network"
    cpus: 2
    memory: "3g"

profiles:
  - name: "c1"
    template: "cluster"
  - name: "c2"
    template: "cluster"
  - name: "c3"
    template: "cluster"
  - name: "c4"
    template: "cluster"
  - name: "c5"
    template: "cluster"
  - name: "c6"
    template: "cluster"
