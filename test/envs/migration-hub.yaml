# Temporary hub for migration testing. Creates a single hub cluster not
# connected to anything. The migration tool handles joining clusters and
# deploying prerequisites.
---
name: "migration-hub"

profiles:
  - name: "hub"
    driver: "$vm"
    container_runtime: containerd
    network: "$network"
    cpus: 2
    memory: "6g"
    workers:
      - addons:
          - name: ocm-hub
          - name: ocm-controller
          - name: olm
