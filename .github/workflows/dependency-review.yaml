---
name: dependency review
on: [pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: `true`

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v5
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
