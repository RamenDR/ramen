# yamllint disable rule:line-length
---
name: e2e daily

on:
  # Run every day on 03:00.
  schedule:
    - cron: '0 3 * * *'
  # Allow manual run.
  # (Actions -> E2E Daily -> Run workflow)
  workflow_dispatch:

jobs:
  refresh-cache:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - e2e-rdr-2
          - e2e-rdr-3
    runs-on: ${{ matrix.runner }}
    if: github.repository == 'RamenDR/ramen'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Create virtual environment
        run: hack/make-venv .venv

      - name: Refresh cache
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 2
          retry_wait_seconds: 60
          max_attempts: 10
          command: |
            cd test
            source ../venv
            drenv cache envs/regional-dr.yaml

  podman-maintenance:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - e2e-rdr-2
          - e2e-rdr-3
    runs-on: ${{ matrix.runner }}
    if: github.repository == 'RamenDR/ramen'
    steps:
      - name: Log podman info
        run: podman info

      - name: Log containers
        run: podman ps -a

      - name: Log volumes
        run: podman volume ls

      - name: Log podman storage
        run: podman system df

      - name: Log images
        run: podman image ls

      - name: Prune images
        run: podman image prune -f
