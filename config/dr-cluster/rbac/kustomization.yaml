resources:
# All RBAC will be applied under this service account in
# the deployment namespace. You may comment out this resource
# if your manager will use a service account that exists at
# runtime. Be sure to update RoleBinding and ClusterRoleBinding
# subjects if changing service account names.
- ../../rbac/service_account.yaml
- role.yaml
- role_binding.yaml
- ../../rbac/leader_election_role.yaml
- ../../rbac/leader_election_role_binding.yaml
# The following resources support controller-runtime built-in metrics auth
# (WithAuthenticationAndAuthorization).
- ../../rbac/metrics_service.yaml
- ../../rbac/metrics_auth_role.yaml
- ../../rbac/metrics_auth_role_binding.yaml
- ../../rbac/metrics_reader_role.yaml
