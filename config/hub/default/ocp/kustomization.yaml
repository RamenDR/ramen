# Adds namespace to all resources.
namespace: ramen-system

# Value of this field is prepended to the
# names of all resources, e.g. a deployment named
# "wordpress" becomes "alices-wordpress".
# Note that it should also match with the prefix (text before '-') of the namespace
# field above.
namePrefix: ramen-hub-

#labels:
#- includeSelectors: true
#  pairs:
#    someName: someValue

transformers:
- |-
  apiVersion: builtin
  kind: LabelTransformer
  metadata:
    name: temporary
  labels:
    app: ramen-hub
  fieldSpecs:
  - kind: Deployment
    path: metadata/labels
  - kind: Deployment
    path: spec/selector/matchLabels
  - kind: Deployment
    path: spec/template/metadata/labels
  - kind: Service
    path: metadata/labels
  - kind: Service
    path: spec/selector
  - kind: ServiceMonitor
    path: metadata/labels
  - kind: ServiceMonitor
    path: spec/selector/matchLabels
  - kind: ConfigMap
    path: metadata/labels
  - kind: PrometheusRule
    path: metadata/labels  

# [PROMETHEUS] To enable prometheus monitor, uncomment all sections with 'PROMETHEUS'.
#-../prometheus

# Metrics endpoint is protected by controller-runtime built-in auth (WithAuthenticationAndAuthorization).

# [METRICS-WITH-CERTS] OpenShift service-ca certificates for the metrics server.
# The service-ca operator will auto-provision and rotate the TLS certificate.
patches:
- path: cert_metrics_service_ca_patch.yaml
  target:
    kind: Service
- path: cert_metrics_manager_patch.yaml
  target:
    kind: Deployment
- path: monitor_tls_patch.yaml
  target:
    kind: ServiceMonitor

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../crd
- ../../rbac
- ../../manager
- ../../../prometheus
- metrics_role_binding.yaml
